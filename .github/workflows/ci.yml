name: CI

on:
  push:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Run format check
        run: nix develop --command ./format.sh

      - name: Check for formatting changes
        run: |
          if ! git diff --exit-code; then
            echo "Formatting changes detected. Please run ./format.sh locally."
            exit 1
          fi

  nix-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: nix build
        run: nix build --print-build-logs

  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set-matrix
        run: echo "matrix=$(jq -c '.' ghc-versions.json)" >> $GITHUB_OUTPUT

  build-and-test:
    needs: generate-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        ghc: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
        # window-latest is left out. GHC is more or less broken on Windows: the time it
        # takes to execute test suites is 10-100 times longer than on Ubuntu.
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    name: ${{ matrix.ghc }} - ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Haskell
        id: setup-haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: 'latest'

      - name: Cache cabal store
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.setup-haskell.outputs.cabal-store }}
          key: cabal-${{ runner.os }}-ghc-${{ matrix.ghc }}-${{ hashFiles('**/*.cabal', '**/cabal.project') }}
          restore-keys: |
            cabal-${{ runner.os }}-ghc-${{ matrix.ghc }}-
            cabal-${{ runner.os }}-

      - name: Update cabal package index
        run: cabal update

      - name: Build all
        run: cabal build all

      - name: Run tests
        run: cabal run unittests -- --hide-successes -j8
        env:
          HC: ${{ matrix.os == 'windows-latest' && 'ghc' || format('ghc-{0}', matrix.ghc) }}
